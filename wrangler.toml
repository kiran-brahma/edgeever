name = "edgeever"
main = "apps/api/src/index.ts"
compatibility_date = "2026-06-26"
workers_dev = true

[assets]
directory = "apps/web/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/mcp", "/__scheduled"]

[[d1_databases]]
binding = "DB"
database_name = "edgeever"
database_id = "085ae2f4-6446-4b10-8a39-ea3d60167b6e"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "RESOURCES"
bucket_name = "edgeever-resources"
preview_bucket_name = "edgeever-resources-preview"

[observability]
enabled = true
